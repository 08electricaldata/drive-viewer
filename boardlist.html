<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Board Master List</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: 'Segoe UI', Arial, sans-serif;
  margin:0;
  background:#f2f4f8;
}

.header{
  background:#0f3057;
  color:white;
  padding:15px;
  text-align:center;
}

.header h2{
  margin:0;
}

.subline{
  font-size:13px;
  margin-top:4px;
  opacity:0.85;
}

.navbar{
  display:flex;
  justify-content:space-between;
  padding:10px 20px;
  background:white;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.navbar button{
  padding:6px 14px;
  border:none;
  border-radius:4px;
  background:#0f3057;
  color:white;
  cursor:pointer;
}

.container{
  padding:15px;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:10px;
}

.controls input, .controls select{
  padding:6px;
  font-size:14px;
}

.stats{
  background:white;
  padding:10px;
  margin-bottom:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  font-size:14px;
}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

th, td{
  border:1px solid #ddd;
  padding:6px;
  font-size:12px;
}

th{
  background:#1f4e79;
  color:white;
  position:sticky;
  top:0;
}

tr:hover{
  background:#f1f7ff;
}

.clickable{
  color:#0066cc;
  cursor:pointer;
  font-weight:bold;
}

@media(max-width:768px){
  table{
    font-size:11px;
  }
  .controls{
    flex-direction:column;
  }
}
</style>
</head>

<body>

<div class="header">
  <h2>Board Master List</h2>
  <div class="subline">Board list is designed and maintained by Rakesh Chandra Sethy</div>
</div>

<div class="navbar">
  <button onclick="history.back()">⬅ Back</button>
  <button onclick="window.location.href='https://08electricaldata.github.io/drive-viewer/'">🏠 Home</button>
</div>

<div class="container">

<div class="controls">
  <input type="text" id="searchBox" placeholder="🔎 Search all columns...">
  <select id="substationFilter">
    <option value="">📊 Filter by Substation</option>
  </select>
</div>

<div class="stats" id="statsBox">
  Loading statistics...
</div>

<table id="boardTable">
<thead>
<tr>
  <th>Sl. No</th>
  <th>Substation</th>
  <th>Voltage Level</th>
  <th>Board Type</th>
  <th>Board No</th>
  <th>Board UID</th>
  <th>Primary Source IC1</th>
  <th>Secondary Source IC2</th>
  <th>Tertiary Source IC3</th>
  <th>Emergency Source</th>
  <th>Remarks</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script>

// ================= URLs =================
const BOARD_JSON = "https://raw.githubusercontent.com/08electricaldata/08electricaldata-json/main/master/board.json";
const SLD_JSON   = "https://raw.githubusercontent.com/08electricaldata/08electricaldata-json/main/sld/boards_sld.json";
const LT_JSON    = "https://raw.githubusercontent.com/08electricaldata/08electricaldata-json/main/sld/lt_sld.json";
// ========================================

let masterData = [];

// ⚡ Ultra-fast Cache
async function loadBoardData(){
  if(sessionStorage.getItem("boardCache")){
    masterData = JSON.parse(sessionStorage.getItem("boardCache"));
    initializePage();
  }else{
    const res = await fetch(BOARD_JSON);
    const json = await res.json();
    masterData = json.data;
    sessionStorage.setItem("boardCache", JSON.stringify(masterData));
    initializePage();
  }
}

function initializePage(){
  buildTable(masterData);
  populateSubstation();
  updateStats(masterData);
}

function buildTable(data){
  const tbody = document.querySelector("#boardTable tbody");
  tbody.innerHTML="";

  data.forEach(row=>{
    const tr = document.createElement("tr");
    tr.innerHTML=`
      <td>${row["Sl. No"]}</td>
      <td>${row["Substation"]}</td>
      <td>${row["Voltage Level"]}</td>
      <td>${row["Board Type"]}</td>
      <td>${row["Board No"]}</td>
      <td class="clickable uid">${row["Board UID"]}</td>
      <td class="clickable source">${row["Primary Source IC1  (Trf/Board No.)"]}</td>
      <td class="clickable source">${row["Secondary Source IC2 (Trf/Board No.)"]}</td>
      <td class="clickable source">${row["Tertiary Source IC3 (If Any)"]}</td>
      <td class="clickable source">${row["Emergency Source (If Any)"]}</td>
      <td>${row["Remarks"]}</td>
    `;
    tbody.appendChild(tr);
  });

  addClickEvents();
}

function populateSubstation(){
  const select=document.getElementById("substationFilter");
  const subs=[...new Set(masterData.map(d=>d["Substation"]))];
  subs.sort().forEach(s=>{
    const opt=document.createElement("option");
    opt.value=s;
    opt.textContent=s;
    select.appendChild(opt);
  });
}

function updateStats(data){
  const total=data.length;
  const voltageCount={};
  data.forEach(d=>{
    const v=d["Voltage Level"];
    voltageCount[v]=(voltageCount[v]||0)+1;
  });

  let html=`<b>Total Boards:</b> ${total} | `;
  Object.keys(voltageCount).forEach(v=>{
    html+=`<b>${v}:</b> ${voltageCount[v]} &nbsp;`;
  });

  document.getElementById("statsBox").innerHTML=html;
}

// 🔎 Search
document.getElementById("searchBox").addEventListener("input",function(){
  filterData();
});

// 📊 Filter
document.getElementById("substationFilter").addEventListener("change",function(){
  filterData();
});

function filterData(){
  const text=document.getElementById("searchBox").value.toLowerCase();
  const sub=document.getElementById("substationFilter").value;

  const filtered=masterData.filter(row=>{
    const matchSearch=Object.values(row).join(" ").toLowerCase().includes(text);
    const matchSub=sub? row["Substation"]===sub : true;
    return matchSearch && matchSub;
  });

  buildTable(filtered);
  updateStats(filtered);
}


// ================= Click Logic =================
function addClickEvents(){

  document.querySelectorAll(".uid").forEach(cell=>{
    cell.onclick=()=> searchAndRedirect(cell.innerText.trim());
  });

  document.querySelectorAll(".source").forEach(cell=>{
    cell.onclick=()=>{
      const breaker=cell.innerText.trim();
      if(!breaker||breaker==="Nil") return;
      window.location.href=
        "https://08electricaldata.github.io/drive-viewer/index.html?id=BREAKER-"+
        encodeURIComponent(breaker);
    }
  });
}

async function searchAndRedirect(boardId){

  const [sldRes, ltRes]=await Promise.all([
    fetch(SLD_JSON),
    fetch(LT_JSON)
  ]);

  const sld=await sldRes.json();
  const lt=await ltRes.json();

  if(sld.boards && sld.boards[boardId]){
    window.location.href=
      "https://08electricaldata.github.io/drive-viewer/sld.html?id="+boardId;
    return;
  }

  if(lt.boards && lt.boards[boardId]){
    window.location.href=
      "https://08electricaldata.github.io/drive-viewer/sld3.html?id="+boardId;
    return;
  }

  alert("Board not found in SLD database");
}

loadBoardData();

</script>

</body>
</html>
