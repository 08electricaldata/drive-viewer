<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HT Board Professional SLD</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- PDF Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
.subtitle{font-size:14px;font-weight:600;color:#cce0ff;text-align:center;margin-top:2px;}
body{font-family:Arial;margin:0;background:#f2f6ff}

.header-bar{
  position:sticky;top:0;z-index:1000;
  background:#003f88;color:#fff;
  display:flex;align-items:center;gap:10px;padding:12px;
}
.header-bar button{
  background:#fff;color:#003f88;border:none;
  border-radius:6px;padding:8px 12px;font-size:16px;cursor:pointer;
}
.header-title{flex:1;text-align:center;font-size:22px;font-weight:700}

.container{padding:12px}
.card{background:#fff;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,.15);padding:12px;}

.toolbar{margin-bottom:12px;display:flex;gap:8px;}
.toolbar button{background:#003f88;color:#fff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;}

#columnTable{width:100%;border-collapse:collapse;margin-bottom:15px;table-layout:fixed;}
#columnTable th,#columnTable td{border:1px solid #000;padding:6px;text-align:center;font-size:13px;font-weight:600;}

.incomer{background:#d9f2d9}
.outgoing{background:#d9e8ff}
.coupler{background:#fff3b0}

#wrap{overflow:auto;border:1px solid #ccc;background:#fff;height:70vh;transform-origin:0 0;}
.bus{stroke:#000;stroke-width:4}
.power-line{stroke:#00cc44;stroke-width:4;stroke-dasharray:10 6;animation:flow 1s linear infinite;}
@keyframes flow{from{stroke-dashoffset:0}to{stroke-dashoffset:-32}}

.label{font-size:16px;font-weight:600;text-anchor:middle}
.cbtext{font-size:15px;font-weight:bold;text-anchor:middle}
.board-title{font-size:24px;font-weight:900;fill:#003f88;text-anchor:middle;}
.info{font-weight:bold;color:#003f88;margin-bottom:8px}
</style>
</head>

<body>

<div class="header-bar">
  <button onclick="goHome()">🏠 Home</button>
  <button onclick="goBack()">⬅ Back</button>
  <div style="flex:1;text-align:center;">
    <div class="header-title" id="title">HT BOARD SLD</div>
    <div class="subtitle">Designed and Maintained by Rakesh Chandra Sethy</div>
  </div>
</div>

<div class="container">
<div class="card">

<div class="info" id="boardInfo">Loading...</div>

<div class="toolbar">
  <button onclick="zoomIn()">🔍 +</button>
  <button onclick="zoomOut()">🔎 -</button>
  <button onclick="fitScreen()">📐 Fit</button>
  <button onclick="exportPDF()">📄 Export PDF</button>
</div>

<table id="columnTable"></table>

<div id="wrap">
  <svg id="sldCanvas" viewBox="0 0 1400 620"></svg>
</div>

</div>
</div>

<script>

const JSON_URL="https://raw.githubusercontent.com/08electricaldata/08electricaldata-json/main/sld/boards_sld.json";

function goHome(){location.href="https://08electricaldata.github.io/"}
function goBack(){history.back()}
function getParam(n){return new URL(location.href).searchParams.get(n)}

const columnTable=document.getElementById("columnTable");
const boardInfoEl=document.getElementById("boardInfo");
const titleEl=document.getElementById("title");
const svg=document.getElementById("sldCanvas");
const wrap=document.getElementById("wrap");

let zoomLevel=1;

function zoomIn(){zoomLevel+=0.1;wrap.style.transform=`scale(${zoomLevel})`}
function zoomOut(){zoomLevel=Math.max(0.5,zoomLevel-0.1);wrap.style.transform=`scale(${zoomLevel})`}
function fitScreen(){
  zoomLevel=wrap.clientWidth/svg.viewBox.baseVal.width;
  wrap.style.transform=`scale(${zoomLevel})`
}
wrap.addEventListener("wheel",(e)=>{e.preventDefault();e.deltaY<0?zoomIn():zoomOut()});

async function exportPDF(){
  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF("l","mm","a3");
  const canvas=await html2canvas(document.querySelector(".card"),{scale:2});
  const img=canvas.toDataURL("image/png");
  const pageWidth=pdf.internal.pageSize.getWidth();
  const imgProps=pdf.getImageProperties(img);
  const imgHeight=(imgProps.height*pageWidth)/imgProps.width;
  pdf.addImage(img,"PNG",0,0,pageWidth,imgHeight);
  pdf.save(titleEl.innerText+".pdf");
}

/* ORIGINAL LOGIC */

function clearSVG(){svg.innerHTML=""}

function line(x1,y1,x2,y2,cls="bus"){
  const e=document.createElementNS("http://www.w3.org/2000/svg","line");
  e.setAttribute("x1",x1);e.setAttribute("y1",y1);
  e.setAttribute("x2",x2);e.setAttribute("y2",y2);
  e.setAttribute("class",cls);
  svg.appendChild(e);
}

function text(x,y,str,anchor="middle",cls="label",clickUrl=null){
  const t=document.createElementNS("http://www.w3.org/2000/svg","text");
  t.setAttribute("x",x);t.setAttribute("y",y);
  t.setAttribute("text-anchor",anchor);
  t.setAttribute("class",cls);
  t.textContent=str;
  if(clickUrl){
    t.style.cursor="pointer";
    t.addEventListener("click",()=>location.href=clickUrl);
  }
  svg.appendChild(t);
}

function transformer(x,y,name,transformerNo){
  const g=document.createElementNS("http://www.w3.org/2000/svg","g");
  const c1=document.createElementNS("http://www.w3.org/2000/svg","circle");
  c1.setAttribute("cx",x-12);c1.setAttribute("cy",y);c1.setAttribute("r",10);
  c1.setAttribute("stroke","#000");c1.setAttribute("fill","none");
  const c2=document.createElementNS("http://www.w3.org/2000/svg","circle");
  c2.setAttribute("cx",x+12);c2.setAttribute("cy",y);c2.setAttribute("r",10);
  c2.setAttribute("stroke","#000");c2.setAttribute("fill","none");
  const lbl=document.createElementNS("http://www.w3.org/2000/svg","text");
  lbl.setAttribute("x",x);lbl.setAttribute("y",y-18);
  lbl.setAttribute("class","label");lbl.textContent=name;
  g.appendChild(c1);g.appendChild(c2);g.appendChild(lbl);
  g.addEventListener("click",()=>location.href="https://08electricaldata.github.io/drive-viewer/history.html?id="+transformerNo);
  svg.appendChild(g);
}

function breaker(x,y,label,side=null,isCoupler=false){
  const r=document.createElementNS("http://www.w3.org/2000/svg","rect");
  r.setAttribute("x",x-18);r.setAttribute("y",y-12);
  r.setAttribute("width",36);r.setAttribute("height",24);
  r.setAttribute("fill","#fff");r.setAttribute("stroke","#000");
  r.setAttribute("stroke-width","2");svg.appendChild(r);
  text(x,y+5,"CB","middle","cbtext");
  if(!label)return;
  const clickUrl="https://08electricaldata.github.io/drive-viewer/history.html?id=Breaker-"+label;
  if(isCoupler) text(x,y-24,label,"middle","label",clickUrl);
  else if(side==="left") text(x-150,y+5,label,"end","label",clickUrl);
  else if(side==="right") text(x+150,y+5,label,"start","label",clickUrl);
}

function arrowDown(x,y){
  line(x,y,x,y+24,"bus");
  const p=document.createElementNS("http://www.w3.org/2000/svg","polygon");
  p.setAttribute("points",`${x-6},${y+24} ${x+6},${y+24} ${x},${y+36}`);
  p.setAttribute("fill","#000");svg.appendChild(p);
}

function draw(board){
  clearSVG();
  let maxPos=0;
  [...(board.outgoings||[])].forEach(r=>{if(r.position>maxPos) maxPos=r.position;});
  maxPos=Math.max(maxPos,30);
  const W=Math.max(1400,maxPos*120);
  svg.setAttribute("viewBox",`0 0 ${W} 620`);

  const BUS_Y=280;const GAP=120;const mid=W/2;
  text(mid,40,getParam("id"),"middle","board-title");

  line(100,BUS_Y,mid-GAP/2,BUS_Y);
  line(mid+GAP/2,BUS_Y,W-100,BUS_Y);

  if(board.busCouplers?.length){
    breaker(mid,BUS_Y,board.busCouplers[0].breakerId,null,true);
  }

  const incomers=[...(board.incomers||[])];
  const spacing=W/(incomers.length+1);

  incomers.forEach((inc,i)=>{
    const x=spacing*(i+1);
    transformer(x,120,inc.source,inc.transformer);
    line(x,140,x,BUS_Y-30,"power-line");
    breaker(x,BUS_Y-40,inc.breakerId,i===0?"left":"right");
  });

  const leftMargin=120;const rightMargin=W-120;
  const usableWidth=rightMargin-leftMargin;

  function posToX(pos){
    if(maxPos<=1)return mid;
    return leftMargin+(usableWidth*(pos-1)/(maxPos-1));
  }

  (board.outgoings||[]).forEach((o,index)=>{
    const x=posToX(o.position);
    line(x,BUS_Y+6,x,BUS_Y+46);
    breaker(x,BUS_Y+66,null);
    arrowDown(x,BUS_Y+82);
    const clickUrl="https://08electricaldata.github.io/drive-viewer/index.html?id="+o.breakerId;
    if(index%2===0) text(x,BUS_Y+150,o.breakerId,"middle","label",clickUrl);
    else text(x,BUS_Y+195,o.breakerId,"middle","label",clickUrl);
  });
}

async function loadSLD(){
  const boardId=getParam("id");
  const res=await fetch(JSON_URL);
  const data=await res.json();
  const board=data.boards?.[boardId];
  if(!board){boardInfoEl.innerText="Board not found";return;}
  boardInfoEl.innerText="Incomers: "+board.topology.totalIncomers;
  draw(board);
}

loadSLD();

</script>
</body>
</html>
