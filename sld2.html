<!DOCTYPE html>

<style>
.subtitle{
  font-size:14px;
  font-weight:600;
  color:#cce0ff;
  text-align:center;
  margin-top:2px;
}
body{font-family:Arial;margin:0;background:#f2f6ff}

/* HEADER */
.header-bar{
  position:sticky;top:0;z-index:1000;
  background:#003f88;color:#fff;
  display:flex;align-items:center;gap:10px;
  padding:12px;
}
.header-bar button{
  background:#fff;color:#003f88;border:none;
  border-radius:6px;padding:8px 12px;
  font-size:16px;cursor:pointer;
}
.header-title{flex:1;text-align:center;font-size:22px;font-weight:700}

.container{padding:12px}
.card{
  background:#fff;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,.15);
  padding:12px;
}

/* TOOLBAR */
.toolbar{
  margin-bottom:12px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.toolbar button{
  background:#003f88;
  color:#fff;
  border:none;
  padding:6px 12px;
  border-radius:6px;
  cursor:pointer;
  font-size:13px;
}

/* TABLE AUTO EXPAND */
.table-wrapper{
  overflow-x:auto;
  margin-bottom:15px;
}
#columnTable{
  border-collapse:collapse;
  width:max-content;
  min-width:100%;
}
#columnTable th,#columnTable td{
  border:1px solid #000;
  padding:8px 12px;
  text-align:center;
  font-size:13px;
  font-weight:600;
  white-space:nowrap;
  min-width:95px;
}

.incomer{background:#d9f2d9}
.outgoing{background:#d9e8ff}
.coupler{background:#fff3b0}

/* SLD */
#wrap{
  overflow:auto;
  border:1px solid #ccc;
  background:#fff;
  height:70vh;
  transform-origin:0 0;
}
.bus{stroke:#000;stroke-width:4}
.power-line{
  stroke:#00cc44;
  stroke-width:4;
  stroke-dasharray:10 6;
  animation:flow 1s linear infinite;
}
@keyframes flow{
  from{stroke-dashoffset:0}
  to{stroke-dashoffset:-32}
}

.label{font-size:16px;font-weight:600;text-anchor:middle}
.cbtext{font-size:15px;font-weight:bold;text-anchor:middle}
.board-title{
  font-size:24px;
  font-weight:900;
  fill:#003f88;
  text-anchor:middle;
}
.info{font-weight:bold;color:#003f88;margin-bottom:8px}
</style>
</head>

<body>

<div class="header-bar">
  <button onclick="goHome()">🏠 Home</button>
  <button onclick="goBack()">⬅ Back</button>
  <div style="flex:1;text-align:center;">
    <div class="header-title" id="title">HT BOARD SLD</div>
    <div class="subtitle">Designed and Maintained by Rakesh Chandra Sethy</div>
  </div>
</div>

<div class="container">
  <div class="card">

    <div class="info" id="boardInfo">Loading...</div>

    <!-- TOOLBAR -->
    <div class="toolbar">
      <button onclick="zoomIn()">🔍 +</button>
      <button onclick="zoomOut()">🔎 -</button>
      <button onclick="fitScreen()">📐 Fit</button>
      <button onclick="exportPDF()">📄 Export PDF</button>
    </div>

    <div class="table-wrapper">
      <table id="columnTable"></table>
    </div>

    <div id="wrap">
      <svg id="sldCanvas" viewBox="0 0 1400 620"></svg>
    </div>

  </div>
</div>

<script>

const JSON_URL =
"https://raw.githubusercontent.com/08electricaldata/08electricaldata-json/main/sld/boards_sld.json";

function goHome(){location.href="https://08electricaldata.github.io/"}
function goBack(){history.back()}
function getParam(n){return new URL(location.href).searchParams.get(n)}

const columnTable=document.getElementById("columnTable");
const boardInfoEl=document.getElementById("boardInfo");
const titleEl=document.getElementById("title");
const svg=document.getElementById("sldCanvas");
const wrap=document.getElementById("wrap");

let zoomLevel=1;

/* ZOOM */
function zoomIn(){ zoomLevel+=0.1; wrap.style.transform=`scale(${zoomLevel})`; }
function zoomOut(){ zoomLevel=Math.max(0.5,zoomLevel-0.1); wrap.style.transform=`scale(${zoomLevel})`; }
function fitScreen(){
  zoomLevel=wrap.clientWidth/svg.viewBox.baseVal.width;
  wrap.style.transform=`scale(${zoomLevel})`;
}
wrap.addEventListener("wheel",(e)=>{
  e.preventDefault();
  if(e.deltaY<0) zoomIn();
  else zoomOut();
});

/* MULTI PAGE PDF */
async function exportPDF(){
  const { jsPDF }=window.jspdf;
  const pdf=new jsPDF("l","mm","a3");
  const canvas=await html2canvas(document.querySelector(".card"),{scale:2});
  const img=canvas.toDataURL("image/png");
  const pageWidth=pdf.internal.pageSize.getWidth();
  const pageHeight=pdf.internal.pageSize.getHeight();
  const imgProps=pdf.getImageProperties(img);
  const imgHeight=(imgProps.height*pageWidth)/imgProps.width;

  let heightLeft=imgHeight;
  let position=0;

  pdf.addImage(img,"PNG",0,position,pageWidth,imgHeight);
  heightLeft-=pageHeight;

  while(heightLeft>0){
    position=heightLeft-imgHeight;
    pdf.addPage();
    pdf.addImage(img,"PNG",0,position,pageWidth,imgHeight);
    heightLeft-=pageHeight;
  }

  pdf.save(titleEl.innerText+".pdf");
}
