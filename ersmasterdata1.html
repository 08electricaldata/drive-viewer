
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pending Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;margin:0;background:#f4f7ff;}

/* HEADER */
.header{
  background:#003f88;
  color:#fff;
  padding:15px 10px;
}

.header-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}

.header-center{
  text-align:center;
  flex:1;
}

.header-center h1{
  margin:0;
  font-size:22px;
}

.header-center p{
  margin:3px 0 0;
  font-size:13px;
  font-weight:normal;
}

.header-btn{
  background:#fff;
  color:#003f88;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  font-size:13px;
  cursor:pointer;
  margin:3px;
}

.controls{
  padding:15px;
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
}

select,input,button{
  padding:7px 10px;
  font-size:14px;
}

.summary{
  display:flex;
  gap:15px;
  justify-content:center;
  padding:10px;
  flex-wrap:wrap;
}

.card{
  background:#fff;
  padding:12px 18px;
  border-radius:6px;
  box-shadow:0 2px 5px rgba(0,0,0,.15);
  text-align:center;
  min-width:130px;
}

.card h3{margin:0;font-size:18px;}

.table-wrapper{
  padding:10px;
  overflow:auto;
  max-height:40vh;
}

.section-title{
  padding-left:15px;
  font-weight:bold;
  margin-top:10px;
}

table{
  border-collapse:collapse;
  width:max-content;
  min-width:100%;
  background:#fff;
}

th,td{
  border:1px solid #ccc;
  padding:8px 10px;
  white-space:nowrap;
  text-align:center;
  font-size:13px;
}

th{
  background:#003f88;
  color:#fff;
  position:sticky;
  top:0;
  z-index:2;
}

.priority-1{background:#ff4d4d;color:#fff;}
.priority-2{background:#ff9933;color:#fff;}
.priority-3{background:#ffcc00;color:#000;}
.priority-4{background:#66cc66;color:#000;}

.badge{
  padding:4px 8px;
  border-radius:4px;
  color:#fff;
  font-weight:bold;
}

.completed{background:#28a745;}

</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-bar">

    <div>
      <button class="header-btn" onclick="history.back()">⬅ Back</button>
      <button class="header-btn" onclick="location.href='https://08electricaldata.github.io/'">🏠 Home</button>
      <button class="header-btn" onclick="location.href='https://08electricaldata.github.io/drive-viewer/ersmasterdata.html'">🗂️ ERS Master</button>
    </div>

    <div class="header-center">
      <h1>Rewinding / Overhauling Dashboard</h1>
      <p>Designed and maintained by Rakesh Chandra Sethi</p>
    </div>

    <div></div>

  </div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <select id="typeSelect">
    <option value="rewinding">Rewinding</option>
    <option value="overhauling">Overhauling</option>
  </select>
  <input type="text" id="searchBox" placeholder="Search...">
  <button onclick="exportCSV()">Export Excel</button>
</div>

<!-- SUMMARY -->
<div class="summary">
  <div class="card"><h3 id="totalCount">0</h3><span>Total</span></div>
  <div class="card"><h3 id="highCount">0</h3><span>High Priority</span></div>
  <div class="card"><h3 id="mediumCount">0</h3><span>Medium</span></div>
  <div class="card"><h3 id="lowCount">0</h3><span>Low</span></div>
  <div class="card"><h3 id="noPriorityCount">0</h3><span>No Priority</span></div>
</div>

<div class="section-title">Priority Assigned</div>
<div class="table-wrapper">
  <table id="priorityTable">
    <thead></thead>
    <tbody></tbody>
  </table>
</div>

<div class="section-title">No Priority Assigned</div>
<div class="table-wrapper">
  <table id="noPriorityTable">
    <thead></thead>
    <tbody></tbody>
  </table>
</div>

<script>
// 🔵 Your previous full working JS remains unchanged below this line
// (Keeping your priority logic exactly same)

const JSON_FILES={
  rewinding:"https://raw.githubusercontent.com/08electricaldata/08electricaldata-json/main/master/rewinding.json",
  overhauling:"https://raw.githubusercontent.com/08electricaldata/08electricaldata-json/main/master/overhauling.json"
};

let currentData=[];
let headers=[];
let priorityKey="";

const select=document.getElementById("typeSelect");
const searchBox=document.getElementById("searchBox");

async function loadData(type){
  const res=await fetch(JSON_FILES[type]);
  const json=await res.json();
  currentData=json.data||[];
  if(currentData.length===0) return;
  headers=Object.keys(currentData[0]);
  priorityKey=headers[14];
  render();
}

function render(){
  const q=searchBox.value.toLowerCase();
  const filtered=currentData.filter(r=>{
    return Object.values(r).join(" ").toLowerCase().includes(q);
  });

  const withPriority=[];
  const withoutPriority=[];

  filtered.forEach(r=>{
    if(r[priorityKey]) withPriority.push(r);
    else withoutPriority.push(r);
  });

  withPriority.sort((a,b)=>Number(a[priorityKey])-Number(b[priorityKey]));

  buildTable("priorityTable",withPriority);
  buildTable("noPriorityTable",withoutPriority);
  updateCards(withPriority,withoutPriority);
}

function buildTable(id,data){
  const table=document.getElementById(id);
  const thead=table.querySelector("thead");
  const tbody=table.querySelector("tbody");

  if(data.length===0){
    thead.innerHTML="";
    tbody.innerHTML="<tr><td>No Data</td></tr>";
    return;
  }

  const ordered=[priorityKey].concat(headers.slice(0,14));

  let head="<tr>";
  ordered.forEach(h=>head+=`<th>${h}</th>`);
  head+="</tr>";
  thead.innerHTML=head;

  tbody.innerHTML="";
  data.forEach(r=>{
    let tr="<tr>";
    ordered.forEach(h=>{
      let val=r[h]??"";
      if(h===priorityKey){
        tr+=`<td class="priority-${val}">${val}</td>`;
      }
      else if(String(val).toUpperCase().includes("COMPLETED")){
        tr+=`<td><span class="badge completed">${val}</span></td>`;
      }
      else{
        tr+=`<td>${val}</td>`;
      }
    });
    tr+="</tr>";
    tbody.innerHTML+=tr;
  });
}

function updateCards(withP,withoutP){
  let high=0,med=0,low=0;
  withP.forEach(r=>{
    let p=Number(r[priorityKey]);
    if(p===1) high++;
    if(p===2) med++;
    if(p>=3) low++;
  });

  document.getElementById("totalCount").innerText=withP.length+withoutP.length;
  document.getElementById("highCount").innerText=high;
  document.getElementById("mediumCount").innerText=med;
  document.getElementById("lowCount").innerText=low;
  document.getElementById("noPriorityCount").innerText=withoutP.length;
}

function exportCSV(){
  let csv="";
  const ordered=[priorityKey].concat(headers.slice(0,14));
  csv+=ordered.join(",")+"\n";
  currentData.forEach(r=>{
    csv+=ordered.map(h=>`"${r[h]??""}"`).join(",")+"\n";
  });
  const blob=new Blob([csv],{type:"text/csv"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download="pending_data.csv";
  a.click();
}

select.addEventListener("change",()=>loadData(select.value));
searchBox.addEventListener("keyup",render);

loadData(select.value);
</script>

</body>
</html>
