
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Industrial LT MCC Layout</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial;
  margin:0;
  background:#f2f6ff;
}

/* HEADER */
.header{
  background:#003f88;
  color:white;
  padding:10px;
  text-align:center;
  box-shadow:0 3px 10px rgba(0,0,0,.25);
}

.header-title{
  font-size:22px;
  font-weight:700;
}

.subtitle{
  font-size:14px;
  margin-top:3px;
  font-weight:500;
}

/* BOARD AREA */
#boardWrapper{
  overflow:auto;
  padding:20px;
}

#boardContainer{
  display:flex;
  align-items:flex-start;
  position:relative;
  min-height:500px;
}

/* SECTIONS */
.section{
  background:white;
  border-radius:8px;
  box-shadow:0 6px 15px rgba(0,0,0,.25);
  margin-right:10px;
  display:flex;
  flex-direction:column;
  width:160px;
}

.section-title{
  background:#003f88;
  color:white;
  text-align:center;
  font-weight:bold;
  padding:8px;
  font-size:14px;
  letter-spacing:.5px;
}

/* BASE CELL */
.cell{
  border:2px solid #333;
  padding:8px;
  margin:6px;
  font-size:12px;
  border-radius:6px;
  cursor:pointer;
  min-height:75px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  text-align:center;

  /* 3D SHADOW */
  box-shadow:
    0 4px 8px rgba(0,0,0,.25),
    inset 0 1px 2px rgba(255,255,255,.6);

  transition:all .25s ease;
}

/* ZOOM HOVER EFFECT */
.cell:hover{
  transform:scale(1.05);
  box-shadow:
    0 8px 16px rgba(0,0,0,.35),
    inset 0 1px 2px rgba(255,255,255,.7);
}

/* BIGGER INCOMER BOX */
.incomer-box{
  min-height:110px;
  font-size:14px;
  font-weight:bold;
}

/* BREAKER FONT */
.breaker-font{
  font-size:14px;
  font-weight:bold;
}

/* STATUS COLORS */
.status-on{
  border-color:#00aa00;
  box-shadow:
    0 0 12px rgba(0,255,0,.7),
    0 6px 14px rgba(0,0,0,.3);
}

/* GLOW ANIMATION FOR ON */
@keyframes glowPulse{
  0%{box-shadow:0 0 6px rgba(0,255,0,.6);}
  50%{box-shadow:0 0 16px rgba(0,255,0,1);}
  100%{box-shadow:0 0 6px rgba(0,255,0,.6);}
}
.status-on{
  animation:glowPulse 2s infinite;
}

.status-off{
  border-color:#cc0000;
}

/* DEVICE COLORS (DEEP & DISTINCT) */

.incomer{
  background:#ff4d4d;
}

.coupler{
  background:#ffd633;
}

.outgoing-breaker{
  background:#ff944d;
}

.outgoing-dol{
  background:#4d94ff;
  color:#000;
}

.outgoing-mccb{
  background:#b366ff;
}

.outgoing-sfu{
  background:#33ccff;
}

.spare{
  background:#e0e0e0;
}

/* BUS COUPLER BRIDGE */
.coupler-bridge{
  position:absolute;
  width:6px;
  background:red;
  top:50px;
  height:70px;
  z-index:1;

  /* Animated Power Flow Effect */
  background:linear-gradient(
    to bottom,
    red 0%,
    yellow 50%,
    red 100%
  );
  background-size:100% 200%;
  animation:flowAnimation 1.5s linear infinite;
}

@keyframes flowAnimation{
  0%{background-position:0% 0%;}
  100%{background-position:0% 200%;}
}

</style>
</head>

<body>

<div class="header">
  <div class="header-title" id="title">Industrial LT MCC Layout</div>
  <div class="subtitle">
    Designed and Maintained by Rakesh Chandra Sethy
  </div>
</div>

<div id="boardWrapper">
  <div id="boardContainer"></div>
</div>

<script>

const JSON_URL =
"https://raw.githubusercontent.com/08electricaldata/08electricaldata-json/main/sld/lt_sld.json";

function getParam(n){
  return new URL(location.href).searchParams.get(n);
}

async function load(){

  const boardId=getParam("id");
  if(!boardId) return;

  document.getElementById("title").innerText =
  "Industrial LT MCC Layout - " + boardId;

  const res=await fetch(JSON_URL);
  const data=await res.json();

  const board=data.boards[boardId];
  if(!board) return;

  const container=document.getElementById("boardContainer");
  container.innerHTML="";

  const sections=Object.keys(board.sections)
    .sort((a,b)=>Number(a)-Number(b));

  const sectionWidth=160;
  container.style.width=(sections.length*sectionWidth)+"px";

  let maxDevices=0;
  sections.forEach(sec=>{
    const count=board.sections[sec].length;
    if(count>maxDevices) maxDevices=count;
  });

  sections.forEach((sec,index)=>{

    const secDiv=document.createElement("div");
    secDiv.className="section";

    const title=document.createElement("div");
    title.className="section-title";
    title.innerText="SECTION "+sec;
    secDiv.appendChild(title);

    const devices=board.sections[sec]
      .sort((a,b)=>a.level.localeCompare(b.level));

    devices.forEach(d=>{

      const cell=document.createElement("div");
      cell.className="cell";

      if(d.status && d.status.toUpperCase()==="ON"){
        cell.classList.add("status-on");
      }else{
        cell.classList.add("status-off");
      }

      if(d.feederType === "INCOMER"){
        cell.classList.add("incomer","incomer-box","breaker-font");
      }
      else if(d.feederType === "BUS_COUPLER"){
        cell.classList.add("coupler","breaker-font");

        const bridge=document.createElement("div");
        bridge.className="coupler-bridge";
        bridge.style.left=(index*sectionWidth + 78)+"px";
        container.appendChild(bridge);
      }
      else if(d.feederType === "OUTGOING"){

        if(d.breakerType){
          cell.classList.add("outgoing-breaker","breaker-font");
        }
        else{
          if(d.DriveType === "DOL"){
            cell.classList.add("outgoing-dol");
          }
          else if(d.DriveType === "MCCB"){
            cell.classList.add("outgoing-mccb");
          }
          else if(d.DriveType === "SFU"){
            cell.classList.add("outgoing-sfu");
          }
          else{
            cell.classList.add("outgoing-dol");
          }
        }
      }
      else{
        cell.classList.add("spare");
      }

      cell.innerHTML=
      "<b>"+d.position+"</b><br>"+
      (d.driveid || "")+"<br>"+
      (
        (d.feederType==="INCOMER" ||
         d.feederType==="BUS_COUPLER" ||
         d.breakerType)
        ? (d.breakerType || "")
        : (d.DriveType || "")
      );

      if(d.driveid){
        cell.onclick=function(){
          location.href=
          "https://08electricaldata.github.io/drive-viewer/index.html?id="+
          d.driveid;
        };
      }

      secDiv.appendChild(cell);
    });

    const missing = maxDevices - devices.length;
    for(let i=0;i<missing;i++){
      const empty=document.createElement("div");
      empty.className="cell spare";
      empty.innerHTML="&nbsp;";
      secDiv.appendChild(empty);
    }

    container.appendChild(secDiv);
  });
}

load();

</script>
</body>
</html>
