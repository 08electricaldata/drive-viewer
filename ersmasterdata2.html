<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pending Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial, sans-serif;
  margin:0;
  background:#f4f7ff;
}

.header{
  background:#003f88;
  color:#fff;
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

.controls{
  padding:15px;
  text-align:center;
}

select{
  padding:8px 12px;
  font-size:15px;
}

.table-wrapper{
  padding:15px;
  overflow:auto;
  height:75vh;
}

table{
  border-collapse:collapse;
  background:#fff;
  width:max-content;
  min-width:100%;
  table-layout:auto;
  box-shadow:0 2px 6px rgba(0,0,0,.2);
}

th, td{
  border:1px solid #ccc;
  padding:8px 12px;
  white-space:nowrap;
  font-size:14px;
  text-align:center;
}

th{
  background:#003f88;
  color:#fff;
  position:sticky;
  top:0;
  z-index:2;
}

tbody tr:hover{
  background:#eef5ff;
}

</style>
</head>

<body>

<div class="header">Rewinding / Overhauling Pending Dashboard</div>

<div class="controls">
  <label>Select Type: </label>
  <select id="typeSelect">
    <option value="rewinding">Rewinding</option>
    <option value="overhauling">Overhauling</option>
  </select>
</div>

<div class="table-wrapper">
  <table id="dataTable">
    <thead></thead>
    <tbody></tbody>
  </table>
</div>

<script>

const JSON_FILES = {
  rewinding: "https://raw.githubusercontent.com/08electricaldata/08electricaldata-json/main/master/rewinding.json",
  overhauling: "https://raw.githubusercontent.com/08electricaldata/08electricaldata-json/main/master/overhauling.json"
};

const tableHead = document.querySelector("#dataTable thead");
const tableBody = document.querySelector("#dataTable tbody");
const select = document.getElementById("typeSelect");

async function loadData(type){

  tableHead.innerHTML="";
  tableBody.innerHTML="";

  const response = await fetch(JSON_FILES[type]);
  const json = await response.json();

  if(!json.data || json.data.length===0){
    tableBody.innerHTML="<tr><td>No Data Found</td></tr>";
    return;
  }

  let records = json.data;

  // 🔹 Sort by Column O (15th column) ascending
  records.sort((a,b)=>{
    let pa = Number(a[Object.keys(a)[14]] || 9999);
    let pb = Number(b[Object.keys(b)[14]] || 9999);
    return pa - pb;
  });

  const headers = Object.keys(records[0]);

  // 🔹 Rearrange header order
  const priorityKey = headers[14];   // Column O
  const orderedHeaders = [priorityKey].concat(headers.slice(0,14));

  // 🔹 Create header row
  let headerRow = "<tr>";
  orderedHeaders.forEach(h=>{
    headerRow += `<th>${h}</th>`;
  });
  headerRow += "</tr>";
  tableHead.innerHTML = headerRow;

  // 🔹 Create rows
  records.forEach(row=>{
    let tr = "<tr>";

    orderedHeaders.forEach(h=>{
      tr += `<td>${row[h] ?? ""}</td>`;
    });

    tr += "</tr>";
    tableBody.innerHTML += tr;
  });
}

// 🔹 Initial load
loadData(select.value);

// 🔹 Change event
select.addEventListener("change", function(){
  loadData(this.value);
});

</script>

</body>
</html>
