<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ERS MASTER DATA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial, sans-serif; margin:0; background:#f2f6ff; }

.header { background:#003f88; color:#fff; padding:14px 16px; }
.header-bar { display:flex; align-items:center; justify-content:space-between; }
.header-btn {
  background:#fff; color:#003f88; border:none;
  padding:6px 10px; border-radius:6px;
  font-size:16px; cursor:pointer;
}
.header-center { text-align:center; flex:1; }
.header-center h1 { margin:0; font-size:26px; }

.controls {
  padding:15px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.table-wrapper {
  overflow:auto;
  height:60vh;
  padding:10px;
}

table {
  border-collapse:collapse;
  width:max-content;
  min-width:100%;
  table-layout:auto;
  background:#fff;
  box-shadow:0 2px 6px rgba(0,0,0,.15);
}

th,td {
  border:1px solid #ccc;
  padding:10px 14px;
  text-align:center;
  white-space:nowrap;
  font-size:15px;
}

th {
  background:#003f88;
  color:#fff;
  position:sticky;
  top:0;
  z-index:2;
}

.chart-container{
  padding:20px;
  background:#fff;
  margin:10px;
  box-shadow:0 2px 6px rgba(0,0,0,.15);
}
</style>
</head>

<body>

<div class="header">
  <div class="header-bar">
    <button class="header-btn" onclick="goBack()">⬅ Back</button>
    <div class="header-center">
      <h1>ERS MASTER DATA</h1>
    </div>
    <button class="header-btn" onclick="goHome()">🏠 Home</button>
  </div>
</div>

<div class="controls">
  <input id="search" placeholder="Search any field">
  <select id="areaFilter"><option value="">All Areas</option></select>
  <select id="statusFilter"><option value="">All Status</option></select>
  <select id="ersFilter"><option value="">All ERS Status</option></select>
</div>

<div class="chart-container">
  <canvas id="statusChart"></canvas>
</div>

<div class="table-wrapper">
<table id="tbl">
<thead>
<tr>
<th>SL</th><th>DATE</th><th>W.O NO</th><th>ERS STATUS</th>
<th>STATUS</th><th>SHIFTED TO</th><th>USE STATUS</th>
<th>KW</th><th>MAKE</th><th>FRAME</th><th>RPM</th>
<th>MOUNT</th><th>MOTOR SL</th><th>AREA</th>
<th>EQPT DETAILS</th><th>TYPE</th><th>DRIVE1</th><th>DRIVE2</th>
<th>DATE2</th><th>W.O2</th><th>KW2</th><th>MAKE2</th>
<th>MOUNT2</th><th>M/C NO</th><th>AREA2</th>
<th>LAST MOTORTR</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>
const JSON_URL =
"https://raw.githubusercontent.com/08electricaldata/08electricaldata-json/main/master/motor_transaction.json";

function goHome(){ location.href="https://08electricaldata.github.io/"; }
function goBack(){ window.history.back(); }

let chart;

async function load(){
  const res=await fetch(JSON_URL);
  const data=await res.json();
  let rows=data.rows;

  rows.sort((a,b)=>(b[0]||0)-(a[0]||0));

  const tbody=document.querySelector("#tbl tbody");
  const search=document.getElementById("search");
  const statusFilter=document.getElementById("statusFilter");

  const statuses=new Set();
  rows.forEach(r=>{
    if(r[4]) statuses.add(r[4]);
  });

  statuses.forEach(v=>{
    statusFilter.innerHTML+=`<option value="${v}">${v}</option>`;
  });

  function render(){
    tbody.innerHTML="";
    const q=search.value.toLowerCase();
    const statusVal=statusFilter.value;

    const countMap={};
    let total=0;

    rows.forEach(r=>{
      if(!r[2] && !r[19]) return;
      if(q && !r.join(" ").toLowerCase().includes(q)) return;
      if(statusVal && r[4]!==statusVal) return;

      const tr=document.createElement("tr");
      tr.innerHTML=`<td>${r[0]||""}</td>
<td>${r[1]||""}</td>
<td>${r[2]||""}</td>
<td>${r[3]||""}</td>
<td>${r[4]||""}</td>
<td>${r[5]||""}</td>
<td>${r[6]||""}</td>
<td>${r[7]||""}</td>
<td>${r[8]||""}</td>
<td>${r[9]||""}</td>
<td>${r[10]||""}</td>
<td>${r[11]||""}</td>
<td>${r[12]||""}</td>
<td>${r[13]||""}</td>
<td>${r[14]||""}</td>
<td>${r[15]||""}</td>
<td>${r[16]||""}</td>
<td>${r[17]||""}</td>
<td>${r[18]||""}</td>
<td>${r[19]||""}</td>
<td>${r[20]||""}</td>
<td>${r[21]||""}</td>
<td>${r[22]||""}</td>
<td>${r[23]||""}</td>
<td>${r[24]||""}</td>
<td>${r[25]||""}</td>`;
      tbody.appendChild(tr);

      if(r[4]){
        countMap[r[4]]=(countMap[r[4]]||0)+1;
        total++;
      }
    });

    updateChart(countMap,total);
  }

  function updateChart(countMap,total){
    const labels=Object.keys(countMap);
    const counts=Object.values(countMap);
    const percentages=counts.map(c=>((c/total)*100).toFixed(1));

    if(chart) chart.destroy();

    chart=new Chart(document.getElementById("statusChart"),{
      type:"bar",
      data:{
        labels:labels,
        datasets:[{
          label:"Count",
          data:counts
        }]
      },
      options:{
        plugins:{
          tooltip:{
            callbacks:{
              label:function(ctx){
                return `Count: ${ctx.raw} (${percentages[ctx.dataIndex]}%)`;
              }
            }
          }
        }
      }
    });
  }

  search.onkeyup=render;
  statusFilter.onchange=render;

  render();
}

load();
</script>

</body>
</html>
