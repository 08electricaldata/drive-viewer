<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ERS MASTER DATA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial, sans-serif; margin:0; background:#f2f6ff; }

/* HEADER */
.header { background:#003f88; color:#fff; padding:14px 16px; }
.header-bar { display:flex; align-items:center; justify-content:space-between; }
.header-btn {
  background:#fff; color:#003f88; border:none;
  padding:6px 10px; border-radius:6px;
  font-size:16px; cursor:pointer;
}
.header-center { text-align:center; flex:1; }
.header-center h1 { margin:0; font-size:26px; }

/* CONTROLS */
.controls {
  padding:15px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.controls input, .controls select{
  padding:6px 8px;
  font-size:14px;
}

/* TABLE */
.table-wrapper {
  overflow:auto;
  height:75vh;
  padding:10px;
}

table {
  border-collapse:collapse;
  background:#fff;
  box-shadow:0 2px 6px rgba(0,0,0,.15);
  width:max-content;     /* expand based on content */
  min-width:100%;        /* but not smaller than screen */
  table-layout:auto;     /* auto adjust column width */
}

th,td {
  border:1px solid #ccc;
  padding:10px 14px;
  text-align:center;
  white-space:nowrap;    /* NO WRAP */
  font-size:15px;        /* bigger text */
}

th {
  background:#003f88;
  color:#fff;
  position:sticky;
  top:0;
  z-index:2;
}

tbody tr:hover { background:#eef5ff; }

</style>
</head>
<body>

<div class="header">
  <div class="header-bar">
    <button class="header-btn" onclick="goBack()">⬅ Back</button>
    <div class="header-center">
      <h1>ERS MASTER DATA</h1>
    </div>
    <button class="header-btn" onclick="goHome()">🏠 Home</button>
  </div>
</div>

<div class="controls">
  <input id="search" placeholder="Search any field">
  <select id="areaFilter"><option value="">All Areas</option></select>
  <select id="statusFilter"><option value="">All Status</option></select>
  <select id="ersFilter"><option value="">All ERS Status</option></select>
</div>

<div class="table-wrapper">
<table id="tbl">
<thead>
<tr>
<th>SL</th><th>DATE</th><th>W.O NO</th><th>ERS STATUS</th>
<th>STATUS</th><th>SHIFTED TO</th><th>USE STATUS</th>
<th>KW</th><th>MAKE</th><th>FRAME</th><th>RPM</th>
<th>MOUNT</th><th>MOTOR SL</th><th>AREA</th>
<th>EQPT DETAILS</th><th>TYPE</th><th>DRIVE1</th><th>DRIVE2</th>
<th>DATE2</th><th>W.O2</th><th>KW2</th><th>MAKE2</th>
<th>MOUNT2</th><th>M/C NO</th><th>AREA2</th>
<th>LAST MOTORTR</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>
const JSON_URL =
"https://raw.githubusercontent.com/08electricaldata/08electricaldata-json/main/master/motor_transaction.json";

function goHome(){ location.href="https://08electricaldata.github.io/"; }
function goBack(){ window.history.back(); }

function parseDate(v){
  if(!v) return null;
  const d=new Date(v);
  return isNaN(d)?null:d;
}
function fmt(d){
  if(!d) return "";
  return `${String(d.getDate()).padStart(2,"0")}-${String(d.getMonth()+1).padStart(2,"0")}-${d.getFullYear()}`;
}

async function load(){
  const res=await fetch(JSON_URL);
  const data=await res.json();
  let rows=data.rows;

  // Sort by Column A descending
  rows.sort((a,b)=>(b[0]||0)-(a[0]||0));

  const tbody=document.querySelector("#tbl tbody");
  const areaFilter=document.getElementById("areaFilter");
  const statusFilter=document.getElementById("statusFilter");
  const ersFilter=document.getElementById("ersFilter");
  const search=document.getElementById("search");

  const shiftedColors={}, statusColors={};
  let h1=0, h2=180;

  const areas=new Set();
  const statuses=new Set();
  const ersStatuses=new Set();

  rows.forEach(r=>{
    if(r[5] && !shiftedColors[r[5]]) shiftedColors[r[5]]=`hsl(${h1+=35},70%,45%)`;
    if(r[4] && !statusColors[r[4]]) statusColors[r[4]]=`hsl(${h2+=35},65%,45%)`;

    if(r[13]) areas.add(r[13]);
    if(r[4]) statuses.add(r[4]);
    if(r[3]) ersStatuses.add(r[3]);
  });

  // Fill dropdowns
  areas.forEach(v=>areaFilter.innerHTML+=`<option value="${v}">${v}</option>`);
  statuses.forEach(v=>statusFilter.innerHTML+=`<option value="${v}">${v}</option>`);
  ersStatuses.forEach(v=>ersFilter.innerHTML+=`<option value="${v}">${v}</option>`);

  function render(){
    tbody.innerHTML="";
    const q=search.value.toLowerCase();
    const areaVal=areaFilter.value;
    const statusVal=statusFilter.value;
    const ersVal=ersFilter.value;

    rows.forEach(r=>{

      // Hide if Column C & T both blank
      if(!r[2] && !r[19]) return;

      if(q && !r.join(" ").toLowerCase().includes(q)) return;
      if(areaVal && r[13]!==areaVal) return;
      if(statusVal && r[4]!==statusVal) return;
      if(ersVal && r[3]!==ersVal) return;

      let ersColor="";
      if(r[3]){
        ersColor=r[3].toUpperCase().includes("COMPLETED")?"#28a745":"#007bff";
      }

      const tr=document.createElement("tr");
      tr.innerHTML=`
<td>${r[0]||""}</td>
<td>${fmt(parseDate(r[1]))}</td>
<td>${r[2]||""}</td>
<td style="background:${ersColor};color:#fff;">${r[3]||""}</td>
<td style="background:${statusColors[r[4]]||""};color:#fff;">${r[4]||""}</td>
<td style="background:${shiftedColors[r[5]]||""};color:#fff;">${r[5]||""}</td>
<td>${r[6]||""}</td>
<td>${r[7]||""}</td>
<td>${r[8]||""}</td>
<td>${r[9]||""}</td>
<td>${r[10]||""}</td>
<td>${r[11]||""}</td>
<td>${r[12]||""}</td>
<td>${r[13]||""}</td>
<td>${r[14]||""}</td>
<td>${r[15]||""}</td>
<td>${r[16]||""}</td>
<td>${r[17]||""}</td>
<td>${fmt(parseDate(r[18]))}</td>
<td>${r[19]||""}</td>
<td>${r[20]||""}</td>
<td>${r[21]||""}</td>
<td>${r[22]||""}</td>
<td>${r[23]||""}</td>
<td>${r[24]||""}</td>
<td>${r[25]||""}</td>`;
      tbody.appendChild(tr);
    });
  }

  search.onkeyup=render;
  areaFilter.onchange=render;
  statusFilter.onchange=render;
  ersFilter.onchange=render;

  render();
}

load();
</script>

</body>
</html>
