<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Monthly Job Counts</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== GLOBAL ===== */
body{
  font-family:Arial,sans-serif;
  margin:0;
  background:linear-gradient(135deg,#e6f0ff,#f4f9ff);
}

/* ===== HEADER ===== */
.header{
  background:linear-gradient(135deg,#002b5c,#0052cc);
  color:white;
  padding:25px;
  text-align:center;
  box-shadow:0 6px 25px rgba(0,0,0,.3);
}

.header h1{
  margin:0;
  font-size:28px;
}

.header p{
  margin:6px 0 0;
  font-size:14px;
  opacity:.9;
}

/* ===== NAV BUTTONS ===== */
.nav-buttons{
  margin-top:15px;
  display:flex;
  justify-content:center;
  gap:15px;
}

.nav-buttons button{
  padding:8px 18px;
  font-size:14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:white;
  color:#003f88;
  font-weight:bold;
  transition:.3s;
}

.nav-buttons button:hover{
  transform:translateY(-3px);
  box-shadow:0 6px 15px rgba(0,0,0,.3);
}

/* ===== KPI ===== */
.kpi-wrapper{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
  margin:25px 0;
}

.kpi{
  width:160px;
  padding:15px;
  border-radius:18px;
  text-align:center;
  background:linear-gradient(145deg,#ffffff,#dce9ff);
  box-shadow:
      6px 6px 15px rgba(0,0,0,.2),
      -6px -6px 15px rgba(255,255,255,.8);
  transition:.4s;
  animation:float 4s ease-in-out infinite;
  cursor:pointer;
}

.kpi:hover{
  transform:translateY(-10px) rotateX(5deg) rotateY(5deg);
  box-shadow:0 15px 35px rgba(0,0,0,.4);
}

.kpi h3{
  margin:0;
  font-size:13px;
  color:#003f88;
}

.kpi .num{
  font-size:24px;
  font-weight:bold;
  margin-top:5px;
  color:#000;
}

@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-5px)}
  100%{transform:translateY(0)}
}

/* ===== TABLE ===== */
.table-container{
  max-width:1200px;
  margin:0 auto 50px auto;
  padding:0 15px;
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
  box-shadow:0 6px 25px rgba(0,0,0,.2);
}

th{
  background:#003f88;
  color:white;
  padding:8px;
  font-size:13px;
}

td{
  padding:6px;
  text-align:center;
  border-bottom:1px solid #ddd;
  font-size:13px;
}

td:first-child{
  text-align:left;
  font-weight:bold;
}

tr:hover{
  background:#f2f6ff;
  cursor:pointer;
}

.total-col{
  background:#e6f0ff;
  font-weight:bold;
}

/* ===== MODAL ===== */
#trendModal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(6px);
  z-index:9999;
  align-items:center;
  justify-content:center;
}

.modal-box{
  background:white;
  width:90%;
  max-width:750px;
  border-radius:18px;
  padding:25px;
  position:relative;
}

.close-btn{
  position:absolute;
  top:10px;
  right:15px;
  background:red;
  color:white;
  border:none;
  border-radius:50%;
  width:30px;
  height:30px;
  cursor:pointer;
}

.growth-text{
  text-align:center;
  font-weight:bold;
  margin-bottom:10px;
}

/* ===== JOB DETAIL MODAL ===== */
#jobDetailModal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(6px);
  z-index:10000;
  align-items:center;
  justify-content:center;
}

.job-modal-box{
  background:white;
  width:95%;
  max-width:1000px;
  border-radius:18px;
  padding:25px;
  max-height:85%;
  overflow:auto;
  position:relative;
}

.spinner{
  text-align:center;
  font-weight:bold;
  color:#003f88;
  padding:20px;
}

.search-box{
  margin:10px 0;
  text-align:right;
}

.search-box input{
  padding:6px 10px;
  width:200px;
}

.export-btn{
  margin-left:10px;
  padding:6px 12px;
  background:#003f88;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
  <h1>Monthly Job Counts</h1>
  <p>Designed and maintained by Rakesh Chandra Sethy</p>

  <div class="nav-buttons">
    <button onclick="history.back()">🔙 Back</button>
    <button onclick="location.href='index.html'">🏠 Home</button>
  </div>
</div>

<div class="kpi-wrapper" id="kpiSection"></div>

<div class="table-container">
  <table id="jobTable"></table>
</div>

<!-- TREND MODAL -->
<div id="trendModal">
  <div class="modal-box">
    <button class="close-btn" onclick="closeTrend()">✕</button>
    <h3 id="trendTitle" style="text-align:center;color:#003f88"></h3>
    <div id="growthInfo" class="growth-text"></div>
    <canvas id="trendChart" height="120"></canvas>
  </div>
</div>

<!-- JOB DETAIL MODAL -->
<div id="jobDetailModal">
  <div class="job-modal-box">
    <button class="close-btn" onclick="closeJobDetail()">✕</button>
    <h3 id="jobDetailTitle" style="text-align:center;color:#003f88"></h3>

    <div class="search-box">
      <input type="text" id="jobSearch" placeholder="Search..." onkeyup="filterPopup()">
      <button class="export-btn" onclick="exportPopupCSV()">Export Excel</button>
    </div>

    <div id="popupSpinner" class="spinner">Loading...</div>

    <table id="jobDetailTable" style="width:100%;border-collapse:collapse;"></table>
  </div>
</div>

<script>

const DASHBOARD_JSON =
"https://raw.githubusercontent.com/08electricaldata/08electricaldata-json/main/dashboard/summary.json";

const MONTHLY_JOB_JSON =
"https://raw.githubusercontent.com/08electricaldata/08electricaldata-json/main/dashboard/monthly_job_count.json";

const HISTORY_YEARS = [2026,2025,2024,2023,2022,2021,2020,2019];
const HISTORY_BASE =
"https://raw.githubusercontent.com/08electricaldata/08electricaldata-json/main/history/";

let monthlyData;
let chartInstance;
let HISTORY_DATA = [];
let popupRows = [];

/* PRELOAD ALL HISTORY */
async function preloadHistory(){
  for(const y of HISTORY_YEARS){
    try{
      const res = await fetch(HISTORY_BASE + y + ".json");
      if(!res.ok) continue;
      const data = await res.json();
      if(data.rows) HISTORY_DATA = HISTORY_DATA.concat(data.rows);
    }catch(e){}
  }
}

/* KPI */
async function loadKPI(){
  const res = await fetch(DASHBOARD_JSON);
  const data = await res.json();
  const container = document.getElementById("kpiSection");

  data.metrics.forEach(m=>{
    const box=document.createElement("div");
    box.className="kpi";

    box.innerHTML=
      "<h3>"+m.key.replace(/_/g," ")+"</h3>"+
      "<div class='num'>"+m.due+"</div>"+
      "<small>Installed: "+m.installed+"</small>";

    container.appendChild(box);
  });
}

/* TABLE */
async function loadTable(){
  const res=await fetch(MONTHLY_JOB_JSON);
  monthlyData=await res.json();

  const headers=monthlyData.headers;
  const rows=monthlyData.rows;

  let html="<tr><th>Job Type</th>";

  for(let i=1;i<headers.length;i++){
    const label=new Date(headers[i])
      .toLocaleString('default',{month:'short'});
    html+="<th>"+label+"</th>";
  }

  html+="<th>Total</th></tr>";

  rows.forEach((r,index)=>{
    let total=0;
    for(let i=1;i<r.length;i++){
      total+=Number(r[i]||0);
    }
    if(total===0) return;

    html+="<tr onclick='openTrend("+index+")'>";
    html+="<td>"+r[0]+"</td>";

    for(let i=1;i<r.length;i++){

      const jobType=r[0];
      const headerDate=headers[i];
      const monthIndex=new Date(headerDate).getMonth();
      const yearValue=new Date(headerDate).getFullYear();
      const value=(r[i]||0);

      html+="<td onclick='openMonthDetail(\""
           +jobType+"\","+monthIndex+","
           +yearValue+",event)'>"
           +value+"</td>";
    }

    html+="<td class='total-col'>"+total+"</td>";
    html+="</tr>";
  });

  document.getElementById("jobTable").innerHTML=html;
}

/* POPUP FROM JSON */
async function openMonthDetail(jobType, monthIndex, yearValue, ev){

  ev.stopPropagation();

  document.getElementById("jobDetailModal").style.display="flex";
  document.getElementById("popupSpinner").style.display="block";
  document.getElementById("jobDetailTable").innerHTML="";

  await new Promise(r=>setTimeout(r,300));

  popupRows = HISTORY_DATA.filter(r=>{
    const d=new Date(r[4]);
    return r[7]===jobType &&
           d.getMonth()===monthIndex &&
           d.getFullYear()===yearValue;
  });

  renderPopupTable(popupRows);

  document.getElementById("popupSpinner").style.display="none";

  document.getElementById("jobDetailTitle").innerText=
    jobType+" - "+
    new Date(yearValue,monthIndex)
    .toLocaleString('default',{month:'long'})+
    " "+yearValue;
}

function renderPopupTable(data){

  let html="<tr style='background:#003f88;color:white'>"
          +"<th>TR</th><th>BAT</th><th>EQP</th>"
          +"<th>Date</th><th>Details</th></tr>";

  if(data.length===0){
    html+="<tr><td colspan='5'>No Records Found</td></tr>";
  }else{
    data.forEach(r=>{
      html+="<tr>"
           +"<td>"+(r[0]||"")+"</td>"
           +"<td>"+(r[2]||"")+"</td>"
           +"<td>"+(r[3]||"")+"</td>"
           +"<td>"+new Date(r[4]).toLocaleDateString()+"</td>"
           +"<td>"+(r[5]||"")+"</td>"
           +"</tr>";
    });
  }

  document.getElementById("jobDetailTable").innerHTML=html;
}

function filterPopup(){
  const val=document.getElementById("jobSearch").value.toLowerCase();
  const filtered=popupRows.filter(r=>
    JSON.stringify(r).toLowerCase().includes(val)
  );
  renderPopupTable(filtered);
}

function exportPopupCSV(){
  let csv=[];
  document.querySelectorAll("#jobDetailTable tr").forEach(r=>{
    csv.push([...r.children].map(c=>c.innerText).join(","));
  });
  const blob=new Blob([csv.join("\n")]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="job_details.csv";
  a.click();
}

function closeJobDetail(){
  document.getElementById("jobDetailModal").style.display="none";
}

/* TREND */
function openTrend(index){
  const headers=monthlyData.headers.slice(1);
  const row=monthlyData.rows[index];

  const labels=headers.map(h=>
    new Date(h).toLocaleString('default',{month:'short'})
  );

  const values=row.slice(1);

  document.getElementById("trendTitle").innerText=row[0]+" Trend";
  document.getElementById("trendModal").style.display="flex";

  const ctx=document.getElementById("trendChart");

  if(chartInstance){chartInstance.destroy();}

  chartInstance=new Chart(ctx,{
    data:{
      labels:labels,
      datasets:[
        {type:'bar',data:values,backgroundColor:'rgba(0,82,204,0.4)'},
        {type:'line',data:values,borderColor:'#003f88',tension:0.4}
      ]
    },
    options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}
  });
}

function closeTrend(){
  document.getElementById("trendModal").style.display="none";
}

preloadHistory();
loadKPI();
loadTable();

</script>

</body>
</html>
