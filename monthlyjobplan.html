<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Monthly Job Plan</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial, sans-serif;
  margin:0;
  background:linear-gradient(135deg,#e6f0ff,#f4f9ff);
}

/* HEADER */
.header{
  background:linear-gradient(135deg,#002b5c,#0052cc);
  color:white;
  padding:20px;
  text-align:left;
  position:relative;
}

.header h1{
  margin:0;
  font-size:26px;
}

.header .credit{
  margin-top:5px;
  font-size:14px;
  font-weight:bold;
  color:#cce0ff;
}

/* NAV BUTTONS */
.nav-buttons{
  position:absolute;
  top:20px;
  right:20px;
  display:flex;
  gap:10px;
}

.nav-buttons button{
  padding:8px 14px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
  background:white;
  color:#003f88;
}

/* TABLE */
.container{
  padding:25px;
  overflow-x:auto;
}

table{
  border-collapse:collapse;
  width:100%;
  min-width:900px;
  background:white;
  box-shadow:0 4px 12px rgba(0,0,0,.15);
}

th, td{
  border:1px solid #ccc;
  padding:8px 10px;
  text-align:left;   /* ✅ LEFT ALIGNED */
  white-space:nowrap;
}

th{
  background:linear-gradient(135deg,#003f88,#0052cc);
  color:white;
  font-weight:bold;
}

tr:nth-child(even){
  background:#f4f9ff;
}

/* 🔵 Column B Animated Color */
.col-b{
  font-weight:bold;
  animation:colorShift 6s infinite alternate;
}

@keyframes colorShift{
  0%{color:#003f88;}
  25%{color:#009688;}
  50%{color:#e65100;}
  75%{color:#8e24aa;}
  100%{color:#2e7d32;}
}

/* 🔴 Achieved vs Target Highlight */
.positive{
  background:#e8f5e9 !important;
  color:#1b5e20;
  font-weight:bold;
}

.negative{
  background:#ffebee !important;
  color:#b71c1c;
  font-weight:bold;
}

.equal{
  background:#fff8e1 !important;
  color:#e65100;
  font-weight:bold;
}

.footer{
  text-align:left;
  padding:15px;
  font-size:14px;
  color:#555;
}
</style>
</head>

<body>

<div class="header">
  <h1>Monthly Job Plan</h1>
  <div class="credit">
    Designed and Maintained by Rakesh Chandra Sethy
  </div>

  <div class="nav-buttons">
    <button onclick="history.back()">⬅ Back</button>
    <button onclick="goHome()">🏠 Home</button>
  </div>
</div>

<div class="container">
  <table id="dataTable">
    <thead></thead>
    <tbody></tbody>
  </table>
</div>

<div class="footer">
© 08 Electrical Data
</div>

<script>

const JSON_URL =
"https://raw.githubusercontent.com/08electricaldata/08electricaldata-json/main/dashboard/monthlyjob.json";

function goHome(){
  location.href="https://08electricaldata.github.io/";
}

async function loadData(){

  const res = await fetch(JSON_URL);
  const data = await res.json();

  const headers = data.headers;
  const rows = data.rows;

  const thead = document.querySelector("#dataTable thead");
  const tbody = document.querySelector("#dataTable tbody");

  // Include A → K excluding column D (index 3)
  const includedIndexes = [];
  for(let i=0;i<=10;i++){
    if(i!==3) includedIndexes.push(i);
  }

  /* HEADER */
  let headerRow = "<tr>";
  includedIndexes.forEach(i=>{
    headerRow += "<th>" + (headers[i] || "") + "</th>";
  });
  headerRow += "</tr>";
  thead.innerHTML = headerRow;

  /* ROWS */
  let bodyHTML = "";

  rows.forEach(r=>{
    bodyHTML += "<tr>";

    includedIndexes.forEach(i=>{

      let cellValue = r[i] ?? "";
      let className = "";

      /* ✅ Animate Column B (index 1)
         BUT only if Column A has number */
      if(i === 1 && !isNaN(r[0]) && r[0] !== ""){
        className = "col-b";
      }

      /* ✅ Highlight 5th column (index 5 now)
         Compare Achieved (index 4) vs Target (index 5) */
      if(i === 5){
        const achieved = Number(r[4]) || 0;
        const target = Number(r[5]) || 0;

        if(achieved > target) className += " positive";
        else if(achieved < target) className += " negative";
        else className += " equal";
      }

      bodyHTML += `<td class="${className.trim()}">${cellValue}</td>`;
    });

    bodyHTML += "</tr>";
  });

  tbody.innerHTML = bodyHTML;
}

loadData();

</script>

</body>
</html>
